services:
  # Backend Service
  - type: web
    name: ehealth-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"

  # Frontend Service
  - type: web
    name: ehealth-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: ehealth-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: REACT_APP_SOCKET_URL
        fromService:
          type: web
          name: ehealth-backend
          envVarKey: RENDER_EXTERNAL_URL
